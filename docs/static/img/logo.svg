<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#009c7e"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#00d4aa" stroke-width="3"/>

  <!-- Git branch nodes (3 connected dots) -->
  <circle cx="60" cy="65" r="10" fill="url(#accent)"/>
  <circle cx="100" cy="95" r="10" fill="url(#accent)"/>
  <circle cx="140" cy="65" r="10" fill="url(#accent)"/>

  <!-- Connecting lines (branch) -->
  <line x1="60" y1="65" x2="100" y2="95" stroke="#00d4aa" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="140" y2="65" stroke="#00d4aa" stroke-width="4" stroke-linecap="round"/>
  <!-- Branch off -->
  <line x1="100" y1="95" x2="100" y2="135" stroke="#00d4aa" stroke-width="4" stroke-linecap="round"/>

  <!-- Bot face (friendly robot in the center node) -->
  <circle cx="100" cy="92" r="24" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2.5"/>

  <!-- Eyes -->
  <circle cx="90" cy="88" r="4" fill="#00d4aa"/>
  <circle cx="110" cy="88" r="4" fill="#00d4aa"/>

  <!-- Smile -->
  <path d="M 90 100 Q 100 108 110 100" fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="100" y1="68" x2="100" y2="56" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="52" r="3" fill="#00d4aa"/>

  <!-- Outer orbit ring hint -->
  <circle cx="100" cy="95" r="44" fill="none" stroke="#00d4aa" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- Small decorative dots on orbit -->
  <circle cx="100" cy="51" r="2.5" fill="#00d4aa" opacity="0.6"/>
  <circle cx="144" cy="95" r="2.5" fill="#00d4aa" opacity="0.6"/>
  <circle cx="56" cy="95" r="2.5" fill="#00d4aa" opacity="0.6"/>
</svg>
